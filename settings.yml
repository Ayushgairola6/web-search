# This minimal config enables JSON output and disables the most aggressive engines.
use_default_settings: true

server:
  secret_key: "YOUR_UNIQUE_SECRET_KEY_CHANGE_ME" # Generate a random string
  limiter: false

search:
  formats:
    - json
  disabled_engines:
    - google
    - google_images
    - google_news
    - google_videos
    - duckduckgo
    - brave
